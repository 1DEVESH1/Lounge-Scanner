<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lounge Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.1);
  --accent:#00e5c0;
  --accent2:#7c6ff7;
  --red:#ff4d6d;
  --amber:#ffb830;
  --green:#00e5c0;
  --text:#e8eaf6;
  --muted:rgba(232,234,246,0.5);
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(124,111,247,0.15) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 80%,rgba(0,229,192,0.1) 0%,transparent 60%);
}
.app{max-width:480px;margin:0 auto;padding:16px;padding-bottom:40px}

/* Header */
.header{text-align:center;padding:24px 0 20px}
.header .logo{font-size:28px;font-weight:700;letter-spacing:-0.5px}
.header .logo span{color:var(--accent)}
.header p{color:var(--muted);font-size:14px;margin-top:4px}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:16px;backdrop-filter:blur(10px)}
.card-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px}

/* Scanner */
#qr-reader{width:100%;border-radius:12px;overflow:hidden;background:#000}
#qr-reader video{border-radius:12px}
.scan-toggle{display:flex;gap:8px;margin-bottom:14px}
.tab-btn{flex:1;padding:10px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:10px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.tab-btn.active{background:rgba(0,229,192,0.15);border-color:var(--accent);color:var(--accent)}

/* Textarea */
textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;padding:12px;resize:vertical;min-height:80px;outline:none;transition:border .2s}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}
label{font-size:13px;font-weight:500;color:var(--muted);display:block;margin-bottom:6px;margin-top:12px}
input[type=text]{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;padding:10px 14px;outline:none;transition:border .2s}
input[type=text]:focus{border-color:var(--accent)}
input[type=text]::placeholder{color:var(--muted)}

/* Buttons */
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:0.3px;margin-top:14px}
.btn-validate{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#0a0e1a}
.btn-validate:hover{opacity:0.9;transform:translateY(-1px)}
.btn-redeem{background:linear-gradient(135deg,#ff416c,#ff4b2b);color:#fff}
.btn-redeem:hover{opacity:0.9;transform:translateY(-1px)}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-secondary{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:rgba(255,255,255,0.1)}

/* Status badge */
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.badge-valid{background:rgba(0,229,192,0.15);color:var(--green);border:1px solid rgba(0,229,192,0.3)}
.badge-scheduled{background:rgba(255,184,48,0.15);color:var(--amber);border:1px solid rgba(255,184,48,0.3)}
.badge-invalid{background:rgba(255,77,109,0.15);color:var(--red);border:1px solid rgba(255,77,109,0.3)}
.badge-redeemed{background:rgba(255,184,48,0.15);color:var(--amber);border:1px solid rgba(255,184,48,0.3)}
.badge-success{background:rgba(0,229,192,0.15);color:var(--green);border:1px solid rgba(0,229,192,0.3)}

.info-banner{background:rgba(124,111,247,0.12);border:1px solid rgba(124,111,247,0.35);border-radius:12px;padding:14px;font-size:13px;line-height:1.5;color:var(--text)}
.info-banner strong{color:var(--accent);font-weight:600}
.info-banner .info-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--accent2);margin-bottom:6px}

/* Detail rows */
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:12px;color:var(--muted);font-weight:500}
.detail-value{font-size:14px;font-weight:600;text-align:right;max-width:60%}

/* Loader */
.spinner{width:22px;height:22px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Hidden */
.hidden{display:none}

/* Error */
.error-msg{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);border-radius:10px;padding:12px;font-size:13px;color:var(--red);margin-top:12px;word-break:break-all}

/* Pulse */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.scanning-label{text-align:center;color:var(--accent);font-size:13px;font-weight:500;margin-top:8px;animation:pulse 1.5s ease-in-out infinite}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-green{background:var(--green)}
.dot-red{background:var(--red)}
.dot-amber{background:var(--amber)}

.section-heading{font-size:16px;font-weight:700;margin-bottom:4px}
.divider{height:1px;background:var(--border);margin:16px 0}

/* Duration breakdown */
.duration-block{background:rgba(0,229,192,0.08);border:1px solid rgba(0,229,192,0.22);border-radius:14px;padding:14px;margin-top:4px}
.duration-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--accent);margin-bottom:12px}
.duration-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.duration-item{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.duration-item.total{background:rgba(124,111,247,0.15);border-color:rgba(124,111,247,0.35)}
.duration-label{display:block;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.duration-value{display:block;font-size:16px;font-weight:700;color:var(--text);line-height:1.2}
.duration-sub{display:block;font-size:10px;color:var(--muted);margin-top:4px}
.duration-timeline{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.08)}
.duration-timeline .detail-row{padding:6px 0}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">🛂 Lounge<span>Scanner</span></div>
    <p>Scan &amp; redeem lounge bookings</p>
  </div>

  <!-- Deep-link loading (phone camera opens ?token= URL) -->
  <div class="card hidden" id="step-loading">
    <div class="card-title">Loading Booking</div>
    <p class="scanning-label" style="margin-top:0">Validating your lounge pass…</p>
  </div>

  <!-- STEP 1: Scan / Paste Token -->
  <div class="card" id="step-scan">
    <div class="card-title">Step 1 — Scan or Paste QR Token</div>
    <div class="scan-toggle">
      <button class="tab-btn active" id="tab-camera" onclick="switchTab('camera')">📷 Camera</button>
      <button class="tab-btn" id="tab-paste" onclick="switchTab('paste')">📋 Paste Token</button>
    </div>

    <!-- Camera Mode -->
    <div id="camera-section">
      <div id="qr-reader"></div>
      <p class="scanning-label" id="scan-status">Point camera at QR code…</p>
      <button class="btn btn-secondary" style="margin-top:10px" onclick="stopCamera()">⏹ Stop Camera</button>
    </div>

    <!-- Paste Mode -->
    <div id="paste-section" class="hidden">
      <label for="token-input">Paste JWT token from QR code</label>
      <textarea id="token-input" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
      <label for="outlet-input">Outlet ID</label>
      <input type="text" id="outlet-input" placeholder="3927da12-2b48-409d-ac9c-4de531c47fac"/>
      <button class="btn btn-validate" id="validate-btn" onclick="validateToken()">Validate Booking</button>
    </div>

    <div id="scan-error" class="error-msg hidden"></div>
  </div>

  <!-- STEP 2: Validation Result -->
  <div class="card hidden" id="step-result">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="card-title" style="margin-bottom:0">Booking Details</div>
      <div id="valid-badge"></div>
    </div>

    <div id="booking-details"></div>

    <div id="rejection-block" class="hidden">
      <div class="divider"></div>
      <div id="rejection-reason" class="error-msg" style="margin-top:0"></div>
    </div>

    <div id="scheduled-block" class="hidden">
      <div class="divider"></div>
      <div id="scheduled-message" class="info-banner"></div>
    </div>

    <div id="redeem-block" class="hidden">
      <div class="divider"></div>
      <button class="btn btn-redeem" id="redeem-btn" onclick="redeemBooking()">
        ✅ Confirm Entry — Redeem Booking
      </button>
    </div>

    <button class="btn btn-secondary" style="margin-top:10px" onclick="resetAll()">🔄 Scan Another</button>
  </div>

  <!-- STEP 3: Redemption Result -->
  <div class="card hidden" id="step-redeem">
    <div class="card-title">Redemption</div>
    <div id="redeem-result"></div>
    <button class="btn btn-secondary" style="margin-top:14px" onclick="resetAll()">🔄 Scan Another</button>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let html5Scanner = null;
let scannerStarted = false;
let currentValidation = null; // holds { bookingId, bookingItemId, outletId, token }

function extractTokenFromScan(text) {
  const raw = String(text || "").trim();
  if (!raw) return null;
  if (raw.startsWith("eyJ")) return raw;
  try {
    const url = new URL(raw);
    return url.searchParams.get("token");
  } catch (e) {
    return null;
  }
}

function decodeOutletFromToken(token) {
  try {
    return JSON.parse(atob(String(token || "").split(".")[1])).out || "";
  } catch (e) {
    return "";
  }
}

function showDeepLinkLoading() {
  document.getElementById("step-loading").classList.remove("hidden");
  document.getElementById("step-scan").classList.add("hidden");
  document.getElementById("step-result").classList.add("hidden");
  document.getElementById("step-redeem").classList.add("hidden");
}

function hideDeepLinkLoading() {
  document.getElementById("step-loading").classList.add("hidden");
}

function stripTokenFromUrl() {
  if (!window.location.search.includes("token=")) return;
  history.replaceState({}, "", window.location.pathname || "/");
}

async function validateScannedContent(decodedText) {
  const token = extractTokenFromScan(decodedText);
  if (!token) {
    showScanError("Could not read a lounge pass from that QR code.");
    return;
  }
  const outletId = decodeOutletFromToken(token);
  if (!outletId) {
    switchTab("paste");
    document.getElementById("token-input").value = token;
    showScanError("Could not auto-detect outletId from QR. Please fill Outlet ID and click Validate.");
    return;
  }
  stripTokenFromUrl();
  await callValidate(token, outletId);
}

// ── Tab switching ─────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-camera').classList.toggle('active', tab === 'camera');
  document.getElementById('tab-paste').classList.toggle('active', tab === 'paste');
  document.getElementById('camera-section').classList.toggle('hidden', tab !== 'camera');
  document.getElementById('paste-section').classList.toggle('hidden', tab !== 'paste');
  if (tab === 'camera') startCamera();
  else stopCamera();
}

// ── Camera ─────────────────────────────────────────────────────────────────
function startCamera() {
  if (scannerStarted) return;
  html5Scanner = new Html5Qrcode("qr-reader");
  const config = { fps: 10, qrbox: { width: 240, height: 240 } };
  html5Scanner.start(
    { facingMode: "environment" },
    config,
    onQrScanned,
    () => {}
  ).then(() => {
    scannerStarted = true;
    document.getElementById('scan-status').textContent = 'Point camera at QR code…';
  }).catch(err => {
    showScanError('Camera error: ' + err + '. Use the Paste tab instead.');
    switchTab('paste');
  });
}

function stopCamera() {
  if (html5Scanner && scannerStarted) {
    html5Scanner.stop().catch(() => {});
    scannerStarted = false;
  }
}

async function onQrScanned(decodedText) {
  stopCamera();
  document.getElementById("scan-status").textContent = "✅ QR scanned!";
  await validateScannedContent(decodedText);
}

// ── Validate (paste mode) ─────────────────────────────────────────────────
async function validateToken() {
  const token = document.getElementById('token-input').value.trim();
  const outletId = document.getElementById('outlet-input').value.trim();
  hideScanError();
  if (!token) return showScanError('Please paste a JWT token.');
  if (!outletId) return showScanError('Please enter the Outlet ID.');
  await callValidate(token, outletId);
}

// ── API: Validate ─────────────────────────────────────────────────────────
async function callValidate(token, outletId) {
  setValidateLoading(true);
  try {
    const res = await fetch('/api/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, outletId })
    });
    const json = await res.json();
    hideDeepLinkLoading();
    showValidationResult(json, token, outletId);
  } catch(e) {
    hideDeepLinkLoading();
    document.getElementById("step-scan").classList.remove("hidden");
    showScanError('Network error: ' + e.message);
  } finally {
    setValidateLoading(false);
  }
}

function setValidateLoading(loading) {
  const btn = document.getElementById('validate-btn');
  if (btn) btn.disabled = loading;
  if (btn) btn.innerHTML = loading
    ? '<span class="spinner"></span>Validating…'
    : 'Validate Booking';
}

// ── Render Validation Result ───────────────────────────────────────────────
function showValidationResult(json, token, outletId) {
  const data = json.data || json;
  const isValid = data.valid === true;
  const canRedeemNow = data.loungeDetails?.canRedeemNow === true;
  const isAlreadyRedeemed = data.rejectionReason === 'Booking already redeemed';

  document.getElementById('step-scan').classList.add('hidden');
  document.getElementById('step-result').classList.remove('hidden');

  // Badge
  let badgeHtml = '';
  if (isValid && canRedeemNow) {
    badgeHtml = '<span class="status-badge badge-valid"><span class="dot dot-green"></span>READY TO REDEEM</span>';
  } else if (isValid && !canRedeemNow) {
    badgeHtml = '<span class="status-badge badge-scheduled"><span class="dot dot-amber"></span>VALID</span>';
  } else if (isAlreadyRedeemed) {
    badgeHtml = '<span class="status-badge badge-redeemed"><span class="dot dot-amber"></span>ALREADY REDEEMED</span>';
  } else {
    badgeHtml = '<span class="status-badge badge-invalid"><span class="dot dot-red"></span>REJECTED</span>';
  }
  document.getElementById('valid-badge').innerHTML = badgeHtml;

  // Details
  let detailsHtml = '';
  if (isValid || isAlreadyRedeemed) {
    const bs = data.bookingSummary || {};
    const ld = data.loungeDetails || {};
    const serviceStart = ld.serviceStartTime || ld.redeemableFrom || ld.startTime;
    const serviceEnd = ld.serviceEndTime || ld.redeemableUntil || ld.expiresAt;
    const redeemUntil = ld.redeemableUntil || ld.expiresAt;
    const rows = [
      ['Booking Ref', data.bookingRef || '—'],
      ['Passengers', data.passengerCount ?? '—'],
      ['Lounge', ld.outletName || '—'],
      ['Variant', ld.variantName || '—'],
      ['Travel Date', bs.travelDate ? fmtDate(bs.travelDate) : '—'],
      ['Journey', bs.journeyType || '—'],
      ['Service Starts', serviceStart ? fmtTime(serviceStart) : '—'],
      ['Service Ends', serviceEnd ? fmtTime(serviceEnd) : '—'],
      ['Redeemable From', ld.redeemableFrom ? fmtTime(ld.redeemableFrom) : (serviceStart ? fmtTime(serviceStart) : '—')],
      ['Redeemable Until', redeemUntil ? fmtTime(redeemUntil) : '—'],
      ['Redemption', redemptionStatusLabel(isValid, canRedeemNow, serviceStart)],
      ['Status', bs.status || '—'],
    ];
    detailsHtml = rows.map(([k,v]) =>
      `<div class="detail-row"><span class="detail-label">${k}</span><span class="detail-value">${v}</span></div>`
    ).join('');
    detailsHtml += buildDurationBlock(ld);
    currentValidation = isValid && canRedeemNow ? {
      bookingId: data.bookingId,
      bookingItemId: data.bookingItemId,
      outletId: outletId,
      token,
    } : null;
  } else {
    detailsHtml = '<div class="detail-row"><span class="detail-label">Booking Ref</span><span class="detail-value">—</span></div>';
    currentValidation = null;
  }
  document.getElementById('booking-details').innerHTML = detailsHtml;

  // Rejection reason
  const rejBlock = document.getElementById('rejection-block');
  if (!isValid) {
    rejBlock.classList.remove('hidden');
    document.getElementById('rejection-reason').textContent =
      '⛔ ' + humanRejection(data.rejectionReason || 'Unknown error');
  } else {
    rejBlock.classList.add('hidden');
  }

  // Scheduled / not-yet-redeemable info
  const scheduledBlock = document.getElementById('scheduled-block');
  if (isValid && !canRedeemNow) {
    scheduledBlock.classList.remove('hidden');
    const ld = data.loungeDetails || {};
    const redeemFrom = ld.redeemableFrom || ld.serviceStartTime || ld.startTime;
    document.getElementById('scheduled-message').innerHTML = buildScheduledMessage(data, redeemFrom);
  } else {
    scheduledBlock.classList.add('hidden');
  }

  // Redeem button — only when redemption is allowed right now
  const redeemBlock = document.getElementById('redeem-block');
  if (isValid && canRedeemNow && currentValidation) {
    redeemBlock.classList.remove('hidden');
  } else {
    redeemBlock.classList.add('hidden');
  }
}

// ── API: Redeem ────────────────────────────────────────────────────────────
async function redeemBooking() {
  if (!currentValidation) return;
  const btn = document.getElementById('redeem-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Redeeming…';

  try {
    const res = await fetch('/api/redeem', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bookingId: currentValidation.bookingId,
        bookingItemId: currentValidation.bookingItemId,
        outletId: currentValidation.outletId,
      })
    });
    const json = await res.json();
    showRedeemResult(json);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '✅ Confirm Entry — Redeem Booking';
    alert('Network error: ' + e.message);
  }
}

function showRedeemResult(json) {
  const data = json.data || json;
  document.getElementById('step-result').classList.add('hidden');
  document.getElementById('step-redeem').classList.remove('hidden');

  let html = '';
  if (data.success) {
    const already = data.alreadyRedeemed ? '<p style="color:var(--amber);font-size:13px;margin-top:8px">⚠️ Was already redeemed previously.</p>' : '';
    html = `
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:56px;margin-bottom:12px">✅</div>
        <div class="section-heading">Entry Granted</div>
        <p style="color:var(--muted);font-size:14px;margin-top:6px">Booking redeemed successfully</p>
        ${already}
        <div class="divider"></div>
        <div class="detail-row"><span class="detail-label">Booking Item</span><span class="detail-value" style="font-size:12px">${data.bookingItemId || '—'}</span></div>
        <div class="detail-row"><span class="detail-label">Redeemed At</span><span class="detail-value">${data.redeemedAt ? fmtTime(data.redeemedAt) : '—'}</span></div>
      </div>`;
  } else {
    html = `
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:56px;margin-bottom:12px">❌</div>
        <div class="section-heading">Redemption Failed</div>
        <div class="error-msg" style="margin-top:16px;text-align:left">⛔ ${humanRejection(data.error || 'Unknown error')}</div>
      </div>`;
  }
  document.getElementById('redeem-result').innerHTML = html;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function resetAll() {
  currentValidation = null;
  hideDeepLinkLoading();
  document.getElementById('step-scan').classList.remove('hidden');
  document.getElementById('step-result').classList.add('hidden');
  document.getElementById('step-redeem').classList.add('hidden');
  document.getElementById('scheduled-block').classList.add('hidden');
  document.getElementById('token-input').value = '';
  document.getElementById('outlet-input').value = '';
  hideScanError();
  switchTab('camera');
}

function showScanError(msg) {
  const el = document.getElementById('scan-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function hideScanError() {
  document.getElementById('scan-error').classList.add('hidden');
}

function fmtTime(iso) {
  try {
    return new Date(iso).toLocaleString('en-IN', {
      timeZone: 'Asia/Kolkata',
      day:'2-digit', month:'short', year:'numeric',
      hour:'2-digit', minute:'2-digit', hour12:true
    }) + ' IST';
  } catch(e) { return iso; }
}

function fmtDate(dateStr) {
  try {
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(y, m - 1, d).toLocaleDateString('en-IN', {
      day:'2-digit', month:'short', year:'numeric'
    });
  } catch(e) { return dateStr; }
}

function redemptionStatusLabel(isValid, canRedeemNow, redeemFromIso) {
  if (!isValid) return '—';
  if (canRedeemNow) return '<span style="color:var(--green)">Ready now</span>';
  if (redeemFromIso) {
    return `<span style="color:var(--amber)">Opens ${fmtTime(redeemFromIso)}</span>`;
  }
  return '<span style="color:var(--amber)">Not yet</span>';
}

function formatDurationMinutes(minutes) {
  const value = Number(minutes);
  if (!Number.isFinite(value) || value <= 0) return '—';
  if (value % 60 === 0) {
    const hours = value / 60;
    return hours === 1 ? '1 hour' : `${hours} hours`;
  }
  return `${value} min`;
}

function formatExtraHours(hours) {
  const value = Number(hours);
  if (!Number.isFinite(value) || value < 0) return '—';
  if (value === 0) return 'None';
  return value === 1 ? '1 hour' : `${value} hours`;
}

function buildDurationBlock(ld) {
  const baseMinutes = ld.baseDurationMinutes;
  const extraHours = ld.extraHours;
  const totalMinutes = ld.totalDurationMinutes;
  const hasDuration =
    Number.isFinite(Number(baseMinutes)) ||
    Number.isFinite(Number(extraHours)) ||
    Number.isFinite(Number(totalMinutes)) ||
    ld.bookedDurationLabel;

  if (!hasDuration) return '';

  const baseLabel = formatDurationMinutes(baseMinutes);
  const extraLabel = formatExtraHours(extraHours);
  const totalLabel = ld.bookedDurationLabel || formatDurationMinutes(totalMinutes);
  const variantCode = ld.variantCode ? String(ld.variantCode).replace(/_/g, ' ') : '';
  const serviceStart = ld.serviceStartTime || ld.redeemableFrom || ld.startTime;
  const serviceEnd = ld.serviceEndTime || ld.redeemableUntil || ld.expiresAt;

  return `
    <div class="duration-block">
      <div class="duration-title">Booked Lounge Duration</div>
      <div class="duration-grid">
        <div class="duration-item">
          <span class="duration-label">Base pass</span>
          <span class="duration-value">${baseLabel}</span>
          ${variantCode ? `<span class="duration-sub">${variantCode}</span>` : ''}
        </div>
        <div class="duration-item">
          <span class="duration-label">Extra</span>
          <span class="duration-value">${extraLabel}</span>
          <span class="duration-sub">beyond base</span>
        </div>
        <div class="duration-item total">
          <span class="duration-label">Total</span>
          <span class="duration-value">${totalLabel}</span>
          <span class="duration-sub">booked stay</span>
        </div>
      </div>
      <div class="duration-timeline">
        <div class="detail-row">
          <span class="detail-label">Entry</span>
          <span class="detail-value">${serviceStart ? fmtTime(serviceStart) : '—'}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Must exit by</span>
          <span class="detail-value">${serviceEnd ? fmtTime(serviceEnd) : '—'}</span>
        </div>
      </div>
    </div>`;
}

function buildScheduledMessage(data, redeemFromIso) {
  const bs = data.bookingSummary || {};
  const ld = data.loungeDetails || {};
  const redeemUntil = ld.redeemableUntil || ld.expiresAt || ld.serviceEndTime;
  const travelDate = bs.travelDate ? fmtDate(bs.travelDate) : 'the travel date';
  const opensAt = redeemFromIso ? fmtTime(redeemFromIso) : 'the scheduled time';
  const closesAt = redeemUntil ? fmtTime(redeemUntil) : 'pass expiry';
  const durationSummary = ld.bookedDurationLabel
    ? `Total booked stay: <strong>${ld.bookedDurationLabel}</strong>`
    : '';

  let reason = 'Redemption is not open yet.';
  const todayIst = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
  if (bs.travelDate && bs.travelDate > todayIst) {
    reason = `This is a <strong>future booking</strong> for ${travelDate}.`;
  } else if (redeemFromIso && new Date(redeemFromIso) > new Date()) {
    reason = 'The redemption window has not started yet.';
  }

  return `
    <div class="info-title">Cannot redeem yet</div>
    <p>${reason}</p>
    ${durationSummary ? `<p style="margin-top:8px">${durationSummary} (base ${formatDurationMinutes(ld.baseDurationMinutes)}, extra ${formatExtraHours(ld.extraHours)}).</p>` : ''}
    <p style="margin-top:8px">Guest may enter from <strong>${opensAt}</strong> until <strong>${closesAt}</strong>.</p>
    <p style="margin-top:8px;color:var(--muted)">QR is valid — confirm entry only during the redemption window.</p>`;
}

function humanRejection(reason) {
  const map = {
    'Invalid or expired QR token': 'Invalid or malformed QR token.',
    'Booking not found': 'Booking not found in the system.',
    'QR token not recognized': 'This QR token is not linked to any booking.',
    'Booking is not confirmed': 'Booking is not in a confirmed state.',
    'Booking already redeemed': 'This booking has already been redeemed.',
    'Booking is not active': 'Booking item is not currently active.',
    'QR token expired': 'QR token has expired.',
    'Outside redemption window': 'Outside the valid redemption time window.',
    'Outlet mismatch': 'QR code is not valid for this lounge outlet.',
    'Passenger count mismatch': 'Passenger count mismatch.',
    'Booking date is not valid for today': 'Travel date does not match today (IST).',
    'Booking item not found': 'Booking item not found.',
  };
  return map[reason] || reason;
}

// ── Init ───────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const urlToken =
    extractTokenFromScan(window.location.href) ||
    new URLSearchParams(window.location.search).get("token");
  if (urlToken) {
    showDeepLinkLoading();
    const outletId = decodeOutletFromToken(urlToken);
    if (outletId) {
      stripTokenFromUrl();
      callValidate(urlToken, outletId);
      return;
    }
    hideDeepLinkLoading();
    switchTab('paste');
    document.getElementById('token-input').value = urlToken;
    stripTokenFromUrl();
    return;
  }
  startCamera();
});
</script>
